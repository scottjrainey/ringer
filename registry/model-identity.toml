# Model identity registry — resolves (engine, manifest model field) into the
# display taxonomy: Model / Lab / Harness / Access. This is what the scoreboard and
# Ringside show, and what keeps engine names (codex) from masquerading as
# model names.
#
# confidence: "verified" requires a cited source (see source field);
# "unverified" entries are best current knowledge awaiting the capability
# research pass. Update via PR — this file is loaded into the local read DB.

[engines.codex]
harness = "Codex CLI"
access = "OAuth plan"
default_model_key = "gpt-5.5"

[engines.codex.models."gpt-5.5"]
display = "GPT-5.5"
lab = "OpenAI"
confidence = "verified"     # snapshot gpt-5.5-2026-04-23, Codex CLI default; see capability file
source = "https://developers.openai.com/codex/models"
last_verified = 2026-07-10

[engines.codex.models."gpt-5.6-sol"]
display = "GPT-5.6 Sol"
lab = "OpenAI"
confidence = "verified"
source = "https://developers.openai.com/codex/models"
last_verified = 2026-07-10

[engines.codex.models."gpt-5.6-luna"]
display = "GPT-5.6 Luna"
lab = "OpenAI"
confidence = "verified"
source = "https://developers.openai.com/codex/models"
last_verified = 2026-07-10

[engines.codex.models."gpt-5.6-terra"]
display = "GPT-5.6 Terra"
lab = "OpenAI"
confidence = "verified"
source = "https://developers.openai.com/codex/models"
last_verified = 2026-07-10

[engines.grok]
harness = "Grok Build CLI"
access = "OAuth plan"
default_model_key = "grok-build"

[engines.grok.models."grok-build"]
# "Grok Build" is the HARNESS (the CLI product), never a model name. The CLI
# serves exactly two models: Grok 4.5 (xAI) and Composer 2.5 (Cursor). The
# 'grok-build' engine default resolves to Grok 4.5. An earlier entry here
# wrongly recorded "Grok Build 0.1" as a model — do not reintroduce it.
display = "Grok 4.5"
lab = "xAI"
confidence = "verified"     # operator-confirmed (Jon, 2026-07-10): Grok Build CLI serves Grok 4.5 + Composer 2.5
source = "https://docs.x.ai/developers/release-notes"
last_verified = 2026-07-10

[engines.grok.models."grok-composer-2.5-fast"]
display = "Composer 2.5 Fast"
lab = "Cursor (Anysphere)"
confidence = "verified"     # Cursor (Anysphere) model, served through xAI's Grok Build CLI in our setup
source = "https://cursor.com/blog/composer-2-5"
last_verified = 2026-07-10

[engines.opencode]
harness = "OpenCode"
access = "OpenRouter API"
# model key = the manifest "model" slug; entries below map slugs to display
# names. Unlisted slugs retain their complete raw value, including the
# "openrouter/" prefix, and are marked unregistered until verified here.

[engines.opencode.models."openrouter/z-ai/glm-5.2"]
display = "GLM 5.2"
lab = "Z.ai (Zhipu AI)"
confidence = "verified"
source = "manifest model field; OpenRouter slug z-ai/glm-5.2"
last_verified = 2026-07-10


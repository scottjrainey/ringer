[engines.pi-openrouter]
harness = "Pi"
access = "OpenRouter API"
# model key = the manifest "model" slug. Unlike engines.opencode, pi's
# --provider openrouter takes the BARE OpenRouter catalog slug (no
# "openrouter/" prefix) — confirmed against pi-coding-agent v0.80.7 JSON
# output, which self-reports the same bare slug in each message's "model"
# field. Unlisted slugs retain their raw value and are marked unregistered
# until verified here.

[engines.pi-openrouter.models."z-ai/glm-5.2"]
display = "GLM 5.2"
lab = "Z.ai (Zhipu AI)"
confidence = "verified"
source = "manifest model field; OpenRouter slug z-ai/glm-5.2 (see engines.opencode entry); self-reported by pi-coding-agent v0.80.7 JSON stream"
last_verified = 2026-07-14

